name: EdelPlan zu STRATO übertragen

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Dateien aus GitHub laden
        uses: actions/checkout@v4

      - name: SFTP-Programm installieren
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: EdelPlan zu STRATO hochladen
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          lftp -u "$SFTP_USERNAME","$SFTP_PASSWORD" "sftp://$SFTP_HOST:22" <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 20
          mirror --reverse --delete --verbose \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            ./ ./
          bye
          EOF
